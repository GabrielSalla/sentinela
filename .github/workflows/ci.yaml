name: Run code check and tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check-skip:
    name: Check changes skip
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check changes skip
        id: check
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Non-PR event detected; skip is disabled."
            exit 0
          fi

          IGNORED_PATTERNS="configs/ docs/ example_monitors/ resources/ .gitignore FUNDING.yml LICENSE.txt *.md"
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.sha }}
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          for PATTERN in $IGNORED_PATTERNS; do
            CHANGED_FILES=$(echo "$CHANGED_FILES" | grep -v "^$PATTERN" || true)
          done
          if [ -z "$CHANGED_FILES" ]; then
            echo "Only ignored changes detected"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$(echo "$CHANGED_FILES" | wc -l)" -eq 1 ] && [ "$CHANGED_FILES" = "pyproject.toml" ]; then
            DIFF=$(git diff "$BASE_SHA" "$HEAD_SHA" -- pyproject.toml)
            if echo "$DIFF" | grep -q "^+version = " && echo "$DIFF" | grep -q "^-version = "; then
              echo "Only version change detected"
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "Non-version change detected"
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Non-skip change detected"
          fi

  build-image:
    name: Build image
    runs-on: ubuntu-latest
    needs: check-skip
    if: needs.check-skip.outputs.skip != 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Build image
        run: make build-dev
      - name: Save Docker image
        run: docker save sentinela-dev:latest > /tmp/sentinela_image.tar
      - name: Upload Docker image
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.sha }}
          path: /tmp/sentinela_image.tar

  run-linter:
    name: Run linter
    runs-on: ubuntu-latest
    needs: build-image
    if: needs.check-skip.outputs.skip != 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: ${{ github.sha }}
          path: /tmp
      - name: Load Docker image
        run: docker load --input /tmp/sentinela_image.tar
      - name: Run linter
        run: make linter

  run-mypy:
    name: Run mypy
    runs-on: ubuntu-latest
    needs: build-image
    if: needs.check-skip.outputs.skip != 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: ${{ github.sha }}
          path: /tmp
      - name: Load Docker image
        run: docker load --input /tmp/sentinela_image.tar
      - name: Run mypy
        run: make mypy

  run-tests:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build-image
    if: needs.check-skip.outputs.skip != 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: ${{ github.sha }}
          path: /tmp
      - name: Load Docker image
        run: docker load --input /tmp/sentinela_image.tar
      - name: Run tests
        run: |
          make pull-dev
          make test-dev

  delete-artifacts:
    name: Delete artifacts
    runs-on: ubuntu-latest
    if: always()
    needs:
      - run-linter
      - run-mypy
      - run-tests
    steps:
      - uses: geekyeggo/delete-artifact@v6
        with:
          name: ${{ github.sha }}

  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    needs:
      - check-skip
      - run-linter
      - run-mypy
      - run-tests
    if: always()
    steps:
      - name: Check merge eligibility
        run: |
          if [ "${{ needs.check-skip.outputs.skip }}" = "true" ]; then
            echo "Only skip changes detected; merge-gate job passes."
            exit 0
          fi
          if [ "${{ needs.run-linter.result }}" != "success" ] && [ "${{ needs.run-linter.result }}" != "skipped" ]; then
            echo "run-linter did not succeed or skip: ${{ needs.run-linter.result }}"
            exit 1
          fi
          if [ "${{ needs.run-mypy.result }}" != "success" ] && [ "${{ needs.run-mypy.result }}" != "skipped" ]; then
            echo "run-mypy did not succeed or skip: ${{ needs.run-mypy.result }}"
            exit 1
          fi
          if [ "${{ needs.run-tests.result }}" != "success" ] && [ "${{ needs.run-tests.result }}" != "skipped" ]; then
            echo "run-tests did not succeed or skip: ${{ needs.run-tests.result }}"
            exit 1
          fi
          echo "All required jobs are either skipped or successful."
